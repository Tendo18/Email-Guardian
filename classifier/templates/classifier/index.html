<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailGuardian — Spam & Phishing Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1d27;
            border-bottom: 1px solid #2a2d3a;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
        }

        header span {
            font-size: 0.85rem;
            color: #6b7280;
        }

        .shield {
            font-size: 1.6rem;
        }

        main {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        label:first-of-type {
            margin-top: 0;
        }

        input, textarea {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 12px 14px;
            color: #e0e0e0;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #4f6ef7;
        }

        textarea {
            resize: vertical;
            min-height: 140px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: #4f6ef7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        button:hover {
            background: #3d5ce6;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-card {
            display: none;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .result-card.visible {
            display: block;
        }

        .verdict {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .verdict-icon {
            font-size: 2.5rem;
        }

        .verdict-label {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .verdict-label.legitimate { color: #22c55e; }
        .verdict-label.spam { color: #ef4444; }
        .verdict-label.phishing { color: #f97316; }

        .verdict-sub {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 2px;
        }

        .confidence-bar-container {
            margin-bottom: 24px;
        }

        .confidence-bar-container p {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .confidence-bar {
            background: #0f1117;
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.6s ease;
        }

        .confidence-fill.legitimate { background: #22c55e; }
        .confidence-fill.spam { background: #ef4444; }
        .confidence-fill.phishing { background: #f97316; }

        .probabilities {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .prob-item {
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .prob-item .prob-label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .prob-item .prob-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .prob-item .prob-value.legitimate { color: #22c55e; }
        .prob-item .prob-value.spam { color: #ef4444; }
        .prob-item .prob-value.phishing { color: #f97316; }

        .meta {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2d3a;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .meta-item {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .meta-item span {
            color: #9ca3af;
        }

        .error-card {
            display: none;
            background: #2a1a1a;
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            color: #ef4444;
            font-size: 0.9rem;
        }

        .error-card.visible {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #2a2d3a;
            border-top-color: #4f6ef7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .history-table th {
            text-align: left;
            padding: 10px 12px;
            color: #6b7280;
            font-weight: 500;
            border-bottom: 1px solid #2a2d3a;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .history-table td {
            padding: 12px;
            border-bottom: 1px solid #1a1d27;
            color: #9ca3af;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge.legitimate { background: #052e16; color: #22c55e; }
        .badge.spam { background: #2a0a0a; color: #ef4444; }
        .badge.phishing { background: #2a1500; color: #f97316; }

        footer {
            text-align: center;
            padding: 24px;
            color: #374151;
            font-size: 0.8rem;
            border-top: 1px solid #1a1d27;
        }
    </style>
</head>
<body>

<header>
    <span class="shield">🛡️</span>
    <div>
        <h1>EmailGuardian</h1>
        <span>AI-powered spam & phishing detection</span>
    </div>
</header>

<main>
    <div class="card">
        <h2>Analyze Email</h2>

        <label>Subject</label>
        <input type="text" id="subject" placeholder="Enter email subject...">

        <label>Email Body</label>
        <textarea id="body" placeholder="Paste the email content here..."></textarea>

        <div class="row">
            <div>
                <label>Sender Email</label>
                <input type="text" id="sender_email" placeholder="sender@domain.com">
            </div>
            <div>
                <label>Reply-To (optional)</label>
                <input type="text" id="reply_to" placeholder="replyto@domain.com">
            </div>
        </div>

        <button id="classifyBtn" onclick="classifyEmail()">
            Analyze Email
        </button>
    </div>

    <div class="loading" id="loading">
        <span class="spinner"></span> Analyzing email...
    </div>

    <div class="error-card" id="errorCard"></div>

    <div class="result-card" id="resultCard">
        <div class="verdict">
            <span class="verdict-icon" id="verdictIcon"></span>
            <div>
                <div class="verdict-label" id="verdictLabel"></div>
                <div class="verdict-sub" id="verdictSub"></div>
            </div>
        </div>

        <div class="confidence-bar-container">
            <p>Confidence: <strong id="confidenceText"></strong></p>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill"></div>
            </div>
        </div>

        <div class="probabilities" id="probabilities"></div>

        <div class="meta">
            <div class="meta-item">Model version: <span id="modelVersion"></span></div>
            <div class="meta-item">Classification ID: <span id="classificationId"></span></div>
            <div class="meta-item">Time: <span id="classificationTime"></span></div>
        </div>
    </div>

    <div class="card" id="historyCard" style="display:none">
        <h2>Recent Classifications</h2>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Result</th>
                    <th>Confidence</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</main>

<footer>
    EmailGuardian — Built with Django REST Framework & scikit-learn
</footer>

<script>
    const API_BASE = '/api/v1';
    const ICONS = {
        legitimate: '✅',
        spam: '🚫',
        phishing: '⚠️'
    };
    const MESSAGES = {
        legitimate: 'This email appears to be safe.',
        spam: 'This email looks like spam.',
        phishing: 'Warning — this email shows signs of a phishing attempt.'
    };

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    async function classifyEmail() {
        const subject = document.getElementById('subject').value.trim();
        const body = document.getElementById('body').value.trim();
        const sender_email = document.getElementById('sender_email').value.trim();
        const reply_to = document.getElementById('reply_to').value.trim();

        if (!body) {
            showError('Please paste the email body before analyzing.');
            return;
        }

        setLoading(true);
        hideResult();
        hideError();

        try {
            const csrfToken = getCookie('csrftoken');
            const response = await fetch(`${API_BASE}/classify/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken,
                },
                body: JSON.stringify({ subject, body, sender_email, reply_to })
            });

            const data = await response.json();

            if (!response.ok) {
                showError(data.message || 'Something went wrong. Please try again.');
                return;
            }

            showResult(data);
            loadHistory();

        } catch (err) {
            showError('Could not reach the API. Make sure the server is running.');
        } finally {
            setLoading(false);
        }
    }

    function showResult(data) {
        const label = data.predicted_label;
        const confidence = (data.confidence_score * 100).toFixed(1);
        const probs = data.label_probabilities;

        document.getElementById('verdictIcon').textContent = ICONS[label] || '❓';
        document.getElementById('verdictLabel').textContent = label;
        document.getElementById('verdictLabel').className = `verdict-label ${label}`;
        document.getElementById('verdictSub').textContent = MESSAGES[label] || '';

        document.getElementById('confidenceText').textContent = `${confidence}%`;
        const fill = document.getElementById('confidenceFill');
        fill.style.width = `${confidence}%`;
        fill.className = `confidence-fill ${label}`;

        const probContainer = document.getElementById('probabilities');
        probContainer.innerHTML = '';
        for (const [cls, prob] of Object.entries(probs)) {
            probContainer.innerHTML += `
                <div class="prob-item">
                    <div class="prob-label">${cls}</div>
                    <div class="prob-value ${cls}">${(prob * 100).toFixed(1)}%</div>
                </div>
            `;
        }

        document.getElementById('modelVersion').textContent = data.model_version;
        document.getElementById('classificationId').textContent = `#${data.id}`;
        document.getElementById('classificationTime').textContent = new Date(data.created_at).toLocaleTimeString();

        document.getElementById('resultCard').className = 'result-card visible';
    }

    async function loadHistory() {
        try {
            const response = await fetch(`${API_BASE}/classifications/`);
            const data = await response.json();
            const items = data.results || data;

            if (!items.length) return;

            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = items.slice(0, 5).map(item => `
                <tr>
                    <td>${item.subject || '(no subject)'}</td>
                    <td><span class="badge ${item.predicted_label}">${item.predicted_label}</span></td>
                    <td>${(item.confidence_score * 100).toFixed(1)}%</td>
                    <td>${new Date(item.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');

            document.getElementById('historyCard').style.display = 'block';
        } catch (err) {
            console.log('Could not load history');
        }
    }

    function setLoading(state) {
        document.getElementById('loading').className = state ? 'loading visible' : 'loading';
        document.getElementById('classifyBtn').disabled = state;
        document.getElementById('classifyBtn').textContent = state ? 'Analyzing...' : 'Analyze Email';
    }

    function hideResult() {
        document.getElementById('resultCard').className = 'result-card';
    }

    function showError(msg) {
        const el = document.getElementById('errorCard');
        el.textContent = msg;
        el.className = 'error-card visible';
    }

    function hideError() {
        document.getElementById('errorCard').className = 'error-card';
    }

    loadHistory();
</script>

</body>
</html>
